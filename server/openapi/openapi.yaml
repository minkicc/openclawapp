openapi: 3.1.0
info:
  title: OpenClaw Pairing and Communication API
  version: 0.1.0
  description: API skeleton for device register, pairing, and signaling relay.
servers:
  - url: https://api.openclawapp.dev
paths:
  /healthz:
    get:
      summary: Health check
      operationId: healthz
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /v1/devices/register:
    post:
      summary: Register desktop device basic info
      operationId: registerDevice
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/devices/heartbeat:
    post:
      summary: Update desktop online heartbeat
      operationId: heartbeatDevice
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/devices/{deviceId}/status:
    get:
      summary: Get desktop device status
      operationId: getDeviceStatus
      parameters:
        - name: deviceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/pair/sessions:
    post:
      summary: Create one-time pairing session from desktop
      operationId: createPairSession
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/pair/claim:
    post:
      summary: Claim pairing by QR token
      operationId: claimPair
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/pair/claim-by-code:
    post:
      summary: Claim pairing by manual code
      operationId: claimPairByCode
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/pair/revoke:
    post:
      summary: Revoke a paired binding
      operationId: revokePair
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
  /v1/pair/bindings:
    get:
      summary: List user-device bindings
      operationId: listBindings
      responses:
        "501":
          $ref: "#/components/responses/NotImplemented"
components:
  responses:
    NotImplemented:
      description: Endpoint skeleton exists, implementation pending
      content:
        application/json:
          schema:
            type: object
            required: [ok, code, message]
            properties:
              ok:
                type: boolean
              code:
                type: string
              message:
                type: string
x-websocket:
  endpoints:
    - path: /ws/desktop
      description: Desktop persistent control channel
    - path: /ws/mobile
      description: Mobile persistent control channel
  events:
    - signal.offer
    - signal.answer
    - signal.ice
    - relay.message
    - ack
