services:
  openclaw-server:
    container_name: openclaw-server
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        GOPROXY: ${OPENCLAW_SERVER_GOPROXY:-https://goproxy.cn,direct}
    image: openclaw/server-mvp:dev
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 38089
      STORE_BACKEND: ${OPENCLAW_SERVER_STORE_BACKEND:-memory}
      REDIS_URL: ${OPENCLAW_SERVER_REDIS_URL:-redis://redis:6379}
      REDIS_KEY_PREFIX: ${OPENCLAW_SERVER_REDIS_KEY_PREFIX:-openclaw:server}
    ports:
      - "${OPENCLAW_SERVER_PORT:-38089}:38089"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    restart: unless-stopped
    ports:
      - "${OPENCLAW_REDIS_PORT:-6379}:6379"
