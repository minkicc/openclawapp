<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>OpenClaw Mobile</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="homeView" class="view">
        <header class="topbar">
          <h1>会话列表</h1>
          <button id="pairBtn" class="pair-btn">配对</button>
        </header>
        <section id="sessionList" class="session-list"></section>
      </section>

      <section id="chatView" class="view hidden">
        <header class="chat-topbar">
          <button id="chatBackBtn" class="chat-back-btn">返回</button>
          <div class="chat-title-wrap">
            <h2 id="chatTitle">会话</h2>
            <p id="chatSubtitle" class="status-text">未连接</p>
          </div>
        </header>
        <section id="chatMessages" class="chat-messages"></section>
        <footer class="chat-input-wrap">
          <textarea id="chatInput" rows="2" placeholder="输入消息，Ctrl/Cmd + Enter 发送"></textarea>
          <button id="chatSendBtn" class="chat-send-btn">发送</button>
        </footer>
      </section>
    </main>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
