name: Build And Release Installers

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    env:
      MAC_NOTARY_PROFILE: openclaw-notary

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package.json
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri -> desktop/src-tauri/target

      - name: Install Linux dependencies
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            libjavascriptcoregtk-4.0-dev \
            libsoup2.4-dev \
            libfuse2 \
            desktop-file-utils \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm install --include=dev --prefix desktop

      - name: Import Developer ID certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_CERTIFICATE_P12:-}" || -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "Developer ID certificate secrets not set; skipping certificate import."
            exit 0
          fi

          CERT_PATH="$RUNNER_TEMP/developer-id-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/openclaw-signing.keychain-db"
          KEYCHAIN_PASSWORD="${APPLE_KEYCHAIN_PASSWORD:-$(uuidgen)}"

          if echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            true
          else
            echo -n "$APPLE_CERTIFICATE_P12" | base64 -D > "$CERT_PATH"
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/\"//g')
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Configure notarytool credentials (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_ID:-}" || -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" || -z "${APPLE_TEAM_ID:-}" ]]; then
            echo "Notarization secrets not set; skipping notarytool credential setup."
            exit 0
          fi

          xcrun notarytool store-credentials "$MAC_NOTARY_PROFILE" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID"

      - name: Build installers (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: npm --prefix desktop run dist:linux:ci

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_PROFILE: ${{ env.MAC_NOTARY_PROFILE }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_SIGN_IDENTITY:-}" ]]; then
            export APPLE_SIGN_IDENTITY="-"
          fi
          export ENABLE_CODESIGN="1"

          if [[ -n "${APPLE_CERTIFICATE_P12:-}" && -n "${APPLE_CERTIFICATE_PASSWORD:-}" && -n "${APPLE_SIGN_IDENTITY:-}" && "${APPLE_SIGN_IDENTITY}" != "-" && -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            export ENABLE_NOTARIZE="1"
          else
            export ENABLE_NOTARIZE="0"
          fi

          npm --prefix desktop run dist:mac

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest'
        run: npm --prefix desktop run dist:win:ci

      - name: Sign installers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          WINDOWS_TIMESTAMP_URL: ${{ secrets.WINDOWS_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            Write-Host "Windows signing secrets not set; skipping installer signing."
            exit 0
          }

          $pfxPath = Join-Path $env:RUNNER_TEMP "windows-codesign.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))

          $timestampUrl = if ([string]::IsNullOrWhiteSpace($env:WINDOWS_TIMESTAMP_URL)) {
            "http://timestamp.digicert.com"
          } else {
            $env:WINDOWS_TIMESTAMP_URL
          }

          $signTool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) {
            throw "signtool.exe not found on runner."
          }

          $targets = Get-ChildItem "desktop/src-tauri/target/release/bundle/msi/*.msi" -ErrorAction SilentlyContinue
          if (-not $targets) {
            throw "No MSI installers found to sign."
          }

          foreach ($file in $targets) {
            Write-Host "Signing $($file.FullName)"
            & $signTool.FullName sign `
              /fd SHA256 `
              /td SHA256 `
              /tr $timestampUrl `
              /f $pfxPath `
              /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              "$($file.FullName)"

            & $signTool.FullName verify /pa /v "$($file.FullName)"
          }

          Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue

      - name: Collect installers (Linux)
        if: startsWith(matrix.os, 'ubuntu')
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-artifacts
          cp -v desktop/src-tauri/target/release/bundle/deb/*.deb dist-artifacts/

      - name: Collect installers (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-artifacts
          cp -v desktop/src-tauri/target/release/bundle/dmg/*.dmg dist-artifacts/

      - name: Collect installers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          Copy-Item -Path desktop/src-tauri/target/release/bundle/msi/*.msi -Destination dist-artifacts -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: dist-artifacts/*
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup signing keychain (macOS)
        if: always() && matrix.os == 'macos-latest'
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/openclaw-signing.keychain-db" || true

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: installers-*
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/**/*.dmg
            release-artifacts/**/*.msi
            release-artifacts/**/*.deb
